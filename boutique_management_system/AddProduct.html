<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="navbar">
    <a href="home.html">Home</a>
    <a href="login.html">Login</a>
    <a href="AddProduct.html">Add Products</a>
    <a href="orders.html">Orders</a>
    <a href="cart.html">Cart</a>
    <a href="About.html">About Us</a>
    <a href="ContactUS.html">Contact Us</a>
</div>

<div class="cart-main"> 
    <h2>Add New Product</h2>

    <form class="product-form">
        <label>Product Name</label>
        <input type="text" id="productName" placeholder="Enter product name">

        <label>Price ($)</label>
        <input type="number" id="price" placeholder="Enter price">

        <label>Quantity</label>
        <input type="number" id="quantity" placeholder="Enter quantity">

        <label>Category</label>
        <input type="text" id="category" placeholder="Enter category">

        <div class="buttons">
            <button class="checkout-btn" type="button" onclick="addProduct()">Add Product</button>
            <button class="reset-btn" type="reset">Reset</button>
        </div>
    </form>
</div>

<div class="footer">
    <p><b>Boutique Management System</b></p>
    <p>Email: boutique@gmail.com | Islamabad, Pakistan</p>
</div>

<script>
    function addProduct() {
        let name = document.getElementById("productName").value;
        let price = document.getElementById("price").value;
        let quantity = document.getElementById("quantity").value;
        let category = document.getElementById("category").value;

        if (name === "" || price === "" || quantity === "" || category === "") {
            alert("Please fill all fields!");
            return;
        }

        alert("✅ " + name + " product added successfully!");

        // Form clear after submission
        document.getElementById("productName").value = "";
        document.getElementById("price").value = "";
        document.getElementById("quantity").value = "";
        document.getElementById("category").value = "";
    }
</script>

</body>
</html>
