<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/smoothness/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>

<body>

<div class="login-main">  
    <h2>Login</h2> 

    <form class="login-form" id="loginForm">  

        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your username">
        <span class="error" id="usernameError"></span>

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your Gmail">
        <span class="error" id="emailError"></span>
        
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
        <span class="error" id="passwordError"></span>

        <div class="buttons">
            <button type="submit" class="submit-btn">Login</button>
            <button type="reset" class="reset-btn">Reset</button>
        </div>

    </form>

</div>

<script>
$(document).ready(function () {

    $(".error").hide();

    $(".reset-btn").on("click", function () {
        $(".error").fadeOut();
    });

    $("#loginForm").submit(function (e) {

        e.preventDefault();

        let username = $("#username").val().trim();
        let email = $("#email").val().trim();
        let password = $("#password").val().trim();

        let ok = true;

        // USERNAME
        if (username == "") {
            $("#usernameError").text("Username is required.").fadeIn();
            ok = false;
        } else if (username.length < 6) {
            $("#usernameError").text("Username must be at least 6 characters.").fadeIn();
            ok = false;
        } else if (username.includes(" ")) {
            $("#usernameError").text("Username should not contain spaces.").fadeIn();
            ok = false;
        } else {
            $("#usernameError").fadeOut();
        }

        // EMAIL
        let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (email == "") {
            $("#emailError").text("Email is required.").fadeIn();
            ok = false;
        } else if (!emailPattern.test(email)) {
            $("#emailError").text("Enter a valid email address.").fadeIn();
            ok = false;
        } else {
            $("#emailError").fadeOut();
        }

        // PASSWORD
        if (password == "") {
            $("#passwordError").text("Password is required.").fadeIn();
            ok = false;
        } else if (password.length < 8) {
            $("#passwordError").text("Password must be at least 8 characters.").fadeIn();
            ok = false;
        } else if (!/[A-Z]/.test(password)) {
            $("#passwordError").text("Must contain uppercase letter.").fadeIn();
            ok = false;
        } else if (!/[a-z]/.test(password)) {
            $("#passwordError").text("Must contain lowercase letter.").fadeIn();
            ok = false;
        } else if (!/[0-9]/.test(password)) {
            $("#passwordError").text("Must contain a number.").fadeIn();
            ok = false;
        } else if (!/[!@#$%^&*]/.test(password)) {
            $("#passwordError").text("Must contain special character.").fadeIn();
            ok = false;
        } else {
            $("#passwordError").fadeOut();
        }

        // DIALOG box
        if (ok) {

            $("<div>Thank you! You have entered the correct information.</div>").dialog({
                modal: true,
                title: "Form Submitted Successfully",
                width: 400,
                draggable: true,
                resizable: true,
                show: { effect: "fade", duration: 500 },
                hide: { effect: "fade", duration: 300 },
                buttons: {
                    OK: function () {
                        $(this).dialog("close");
                    }
                }
            });

        }

    });

});
</script>

</body>
</html>
